# Fly.io configuration for Casa CRE API — production
app = "casa-cre-prod"
primary_region = "ord"

[build]
  dockerfile = "server/Dockerfile"

[deploy]
  release_command = "npx prisma migrate deploy --schema=./prisma/schema.prisma"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
