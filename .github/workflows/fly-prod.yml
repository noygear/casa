name: fly-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fly-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: deploy casa-cre-prod
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only --config fly.toml --app casa-cre-prod
