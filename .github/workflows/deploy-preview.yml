name: deploy review apps

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number for manual preview deployment'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: review app
    if: github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_REVIEW }}
      APP_NAME: casa-cre-pr-${{ github.event.pull_request.number || inputs.pr_number }}
      DB_NAME: casa-cre-pr-${{ github.event.pull_request.number || inputs.pr_number }}-db
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly app if needed
        run: |
          flyctl apps create "$APP_NAME" --org noygear 2>/dev/null || true

      - name: Create and attach preview database if needed
        run: |
          if ! flyctl apps list --org noygear --json | jq -e --arg n "$DB_NAME" '.[] | select(.Name == $n)' > /dev/null 2>&1; then
            flyctl postgres create \
              --name "$DB_NAME" \
              --region iad \
              --initial-cluster-size 1 \
              --vm-size shared-cpu-1x \
              --volume-size 1 \
              --org noygear \
              --yes
            flyctl postgres attach "$DB_NAME" --app "$APP_NAME" --yes
          fi

      - name: Set app secrets
        run: |
          flyctl secrets set \
            JWT_SECRET="${{ secrets.REVIEW_JWT_SECRET }}" \
            FRONTEND_URL="https://$APP_NAME.fly.dev" \
            --app "$APP_NAME"

      - name: Deploy preview app
        run: flyctl deploy --remote-only --config fly.preview.toml --app "$APP_NAME"

      - name: Comment preview URL on PR
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const appName = process.env.APP_NAME;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview deployed: https://${appName}.fly.dev`
            });

  cleanup-review:
    name: cleanup review app
    if: github.event_name != 'workflow_dispatch' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_REVIEW }}
      APP_NAME: casa-cre-pr-${{ github.event.pull_request.number }}
      DB_NAME: casa-cre-pr-${{ github.event.pull_request.number }}-db
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy preview app
        run: flyctl apps destroy "$APP_NAME" --yes || true

      - name: Destroy preview database
        run: flyctl apps destroy "$DB_NAME" --yes || true
