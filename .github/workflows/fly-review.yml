name: fly-review

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: fly-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: review app
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_REVIEW }}
      APP_NAME: pr-${{ github.event.pull_request.number }}-casa-cre
      # Each PR gets its own database on the shared cluster, named after the app.
      # Underscores required — hyphens are not valid in Postgres identifiers.
      DB_NAME: pr_${{ github.event.pull_request.number }}_casa_cre
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: create fly app if needed
        run: flyctl apps create "$APP_NAME" --org noygear 2>/dev/null || true

      - name: create per-PR database if needed
        run: |
          flyctl postgres connect -a casa-cre-preview-db --database postgres \
            -c "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" \
            | grep -q 1 \
            || flyctl postgres connect -a casa-cre-preview-db --database postgres \
                 -c "CREATE DATABASE \"$DB_NAME\""

      - name: set app secrets
        run: |
          # Build DATABASE_URL from the base secret, replacing the database name
          BASE_URL="${{ secrets.PREVIEW_DATABASE_URL }}"
          DB_URL="${BASE_URL%/*}/$DB_NAME"
          flyctl secrets set \
            DATABASE_URL="$DB_URL" \
            DIRECT_URL="$DB_URL" \
            JWT_SECRET="${{ secrets.REVIEW_JWT_SECRET }}" \
            FRONTEND_URL="https://$APP_NAME.fly.dev" \
            --app "$APP_NAME"

      - name: deploy preview app
        run: flyctl deploy --remote-only --config fly.review.toml --app "$APP_NAME"

      - name: comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview deployed: https://${process.env.APP_NAME}.fly.dev`
            });

  cleanup-review:
    name: cleanup review app
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_REVIEW }}
      APP_NAME: pr-${{ github.event.pull_request.number }}-casa-cre
      DB_NAME: pr_${{ github.event.pull_request.number }}_casa_cre
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: destroy preview app
        id: destroy
        run: flyctl apps destroy "$APP_NAME" --yes
        continue-on-error: true

      - name: drop per-PR database
        run: |
          flyctl postgres connect -a casa-cre-preview-db --database postgres \
            -c "DROP DATABASE IF EXISTS \"$DB_NAME\" WITH (FORCE)" 2>/dev/null || true
        continue-on-error: true

      - name: comment teardown result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.destroy.outcome }}' === 'success';
            const body = success
              ? `🗑️ Preview app \`${process.env.APP_NAME}\` has been destroyed.`
              : `⚠️ Preview app \`${process.env.APP_NAME}\` teardown failed or app did not exist.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
