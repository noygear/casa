# Fly.io configuration for Casa CRE API — review/preview apps
# The app name is overridden at deploy time via --app pr-<number>-casa-cre
app = "pr-0-casa-cre"
primary_region = "ord"

[build]
  dockerfile = "server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
